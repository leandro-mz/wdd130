<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us | Dry Oar</title>
    <meta name="description"
      content="Contact Dry Oar for the best white water rafting in Mendoza. Our team is ready to help you plan an unforgettable trip. Book your spot on the river now!">
    <meta name="author" content="Leandro Mancuso">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/raftingicon.png" alt="Rafting Icon">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main class="main-contact">
        <h1>Dry Oar Rafting Company</h1>

        <section class="contact-info">
            <h2>Our Location</h2>
            <address>
                <span class="company-name">Dry Oar Rafting Company</span><br>
                123 Ruta Panamericana <br>
                Lujan de Cuyo, Mendoza <br>
                <a href="tel:+549261999999">+54 9 261 999999</a> <br>
                <a href="mailto:info@dryoar.com">info@dryoar.com</a>
            </address>

            <div class="grid-layout">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13379.744547926198!2d-68.8984405!3d-33.031846!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x967dfad5907f159f%3A0x696612c98d69f064!2sLuj%C3%A1n%20de%20Cuyo%2C%20Mendoza!5e0!3m2!1ses!2sar!4v1712345678910!5m2!1ses!2sar"
                  width="600" height="450" style="border:0;" allowfullscreen=""
                  loading="lazy"></iframe>

                <section class="contact-form">
                    <form action="#">
                        <fieldset class="fieldset-one">
                            <legend>Contact Information</legend>
                            <div class="form-item">
                                <label for="name">Name</label>
                                <input type="text" name="name" id="name" required>
                            </div>
                            <div class="form-item">
                                <label for="useremail">Email</label>
                                <input type="email" name="useremail" id="useremail" required>
                            </div>

                            <p>Message Purpose</p>
                            <div class="form-item flex-item">
                                <label for="general"><input type="radio" name="purpose" id="general"
                                      value="general"> General Inquiry</label>
                                <label for="reservation"><input type="radio" name="purpose"
                                      id="reservation" value="reservation-question"> Reservation
                                    Question</label>
                                <label for="website"><input type="radio" name="purpose" id="website"
                                      value="website-suggestion"> Website Suggestion</label>
                            </div>

                            <div class="form-item">
                                <label for="message">Message</label>
                                <textarea name="message" id="message" rows="4"
                                  placeholder="Type here"></textarea>
                            </div>

                            <div class="checkbox">
                                <input type="checkbox" name="subscribe" id="subscribe">
                                <label for="subscribe">Please subscribe me to the monthly
                                    newsletter</label>
                            </div>
                        </fieldset>
                        <button class="button-form" type="submit">Get in Touch!</button>
                    </form>
                </section>
            </div>
        </section>

        <section class="employees">
            <h2>We Are Here To Serve You</h2>
            <div class="employees-container">
                <figure>
                    <img src="images/employe1.jpg" alt="Employee Profile Picture">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/employe2.jpg" alt="Employee Profile Picture">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/employe3.webp" alt="Employee Profile Picture">
                    <figcaption>Employee Profile</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy;2026 | Dry Oar | Leandro Mancuso </p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="instagram Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="Linkedin Icon">
            </a>
        </nav>

    </footer>


</body>

</html>
