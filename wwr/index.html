<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page | Dry Oar</title>
    <meta name="description"
      content="Contact Dry Oar for the best white water rafting in Mendoza. Our team is ready to help you plan an unforgettable trip. Book your spot on the river now!">
    <meta name="author" content="Leandro Mancuso">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/raftingicon.png" alt="Rafting Icon">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>


    <div id="hero">
        <div id="hero-box">
            <img id="hero-img" src="images/heroimage2.jpg" alt="Rafting Adventure">
        </div>
        <section id="hero-msg">
            <h1 class="home-title">Enjoy the Adventure!
            </h1>
            <h4>Come and explore the best rivers with us!</h4>
            <div class="button-box">
                <a href="trips.html" class="cta-button">Are you ready for the trip of your
                    life?</a>
            </div>
        </section>

    </div>

    <section class="newsletter">
        <div class="river-box">
            <img src="images/river.jpg" alt="river image">
        </div>

        <div class="news-form">
            <form action="#">
                <fieldset>
                    <span class="new-title">
                        <p>JOIN OUR NEWSLETTER</p>
                    </span>
                    <label for="name">Full name</label>
                    <input type="text" name="name" id="name">

                    <label for="email">Email</label>
                    <input type="email" name="email" id="email">

                    <button type="submit">SIGN UP</button>


                </fieldset>
            </form>
        </div>


    </section>


    <footer>
        <p>&copy;2026 | Dry Oar | Leandro Mancuso </p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="instagram Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="Linkedin Icon">
            </a>
        </nav>

    </footer>


</body>

</html>
